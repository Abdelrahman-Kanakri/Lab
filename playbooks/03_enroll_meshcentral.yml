---
# Enroll lab devices in MeshCentral using the server-signed agent executable.
# Usage: ansible-playbook -i ~/lab/hosts.ini ~/lab/playbooks/03_enroll_meshcentral.yml --forks 31
#
# Prereqs:
#   - ~/lab/files/MeshService64.exe exists (copied from meshcentral-data/signedagents/)
#   - ansible lab -m win_ping passes on target hosts

- name: Enroll lab devices in MeshCentral
  hosts: lab
  gather_facts: false
  tasks:

    - name: Copy MeshService64.exe to target
      win_copy:
        src: /home/abood/lab/files/MeshService64.exe
        dest: C:\Windows\Temp\MeshService64.exe

    - name: Install Mesh Agent service
      win_command: C:\Windows\Temp\MeshService64.exe -fullinstall
      register: install_result
      failed_when: install_result.rc not in [0, 1]

    - name: Wait for Mesh Agent service to come up
      win_service:
        name: "Mesh Agent"
        state: started
      register: svc_status
      retries: 6
      delay: 5
      until: svc_status is succeeded

    - name: Report service status
      debug:
        msg: "Mesh Agent on {{ inventory_hostname }}: {{ svc_status.state }}"

    - name: Clean up installer
      win_file:
        path: C:\Windows\Temp\MeshService64.exe
        state: absent
